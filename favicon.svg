<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Black background -->
  <rect width="32" height="32" rx="4" fill="#000000"/>
  
  <!-- Diamond/chevron shape outline -->
  <!-- Outer diamond: top point, right, bottom point, left -->
  <polygon points="16,2 28,12 16,24 4,12" fill="none" stroke="white" stroke-width="2.2"/>
  
  <!-- Inner diamond cutout -->
  <polygon points="16,6 24,12 16,20 8,12" fill="black"/>
  
  <!-- Center vertical arrow/sword pointing down -->
  <rect x="15" y="8" width="2" height="8" fill="white"/>
  <!-- Arrow head down -->
  <polygon points="13,15 16,20 19,15" fill="white"/>
  
  <!-- Small horizontal bar (crossguard) -->
  <rect x="11" y="13" width="10" height="1.8" fill="white"/>
</svg>
